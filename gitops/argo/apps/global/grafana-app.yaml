apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      targetRevision: 10.1.2
      chart: grafana
      helm:
        valueFiles:
        - $value/gitops/manifests/monitoring/grafana-values.yaml
    - repoURL: https://github.com/jw-django/observability-gitops.git
      targetRevision: main
      ref: value
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true