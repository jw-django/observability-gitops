deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: standard # 로컬 스토리지 사용

loki:
  auth_enabled: false # 멀티 테넌시 비활성화 (로컬용)
  commonConfig:
    replication_factor: 1
  
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem # S3 대신 로컬 파일시스템 사용
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
          
  storage:
    type: filesystem # S3 대신 로컬 파일시스템 사용

  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 48h # 2일

  compactor:
    retention_enabled: true 
    delete_request_store: filesystem

  ruler:
    enable_api: true
    storage:
      type: local

serviceAccount:
  create: true
  annotations: {} # IRSA 제거

# Basic Auth 비활성화(secret 없이 로컬에서 운영)
gateway:
  service:
    type: ClusterIP
  basicAuth:
    enabled: false

# 테스트 파드 비활성화
lokiCanary:
  enabled: false
test:
  enabled: false
chunksCache:
  allocatedMemory: 512
resultsCache:
  allocatedMemory: 512

# mono 에서는 아래는 제외 
backend: { replicas: 0 }
read: { replicas: 0 }
write: { replicas: 0 }
ingester: { replicas: 0 }
querier: { replicas: 0 }
queryFrontend: { replicas: 0 }
queryScheduler: { replicas: 0 }
distributor: { replicas: 0 }
compactor: { replicas: 0 }
indexGateway: { replicas: 0 }
bloomCompactor: { replicas: 0 }
bloomGateway: { replicas: 0 }
minio:
  enabled: false