kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane # 마스터노드
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

    # localhost:30080, 30443 트래픽과 k8s 내부 Ingress 포트 매핑
    extraPortMappings:
      - containerPort: 80
        hostPort: 30080
        protocol: TCP
      - containerPort: 443
        hostPort: 30443
        protocol: TCP

  # 워커노드1
  - role: worker
    labels:
      tier: frontend

  # 워커노드2
  - role: worker
    labels:
      tier: backend